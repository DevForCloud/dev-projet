apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: staging
spec:
  # 1 seul replica : le service stocke les notifications en mémoire (tableau JS local).
  # Plusieurs replicas créeraient des états divergents — chaque pod aurait sa propre
  # liste de notifications, et les requêtes GET pourraient retourner des résultats
  # différents selon le pod atteint par le load balancer.
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: jplande/taskflow-notification-service:v1.0.0
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: notification-service-cm
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
