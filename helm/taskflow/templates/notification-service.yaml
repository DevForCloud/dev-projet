apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-cm
  namespace: {{ .Release.Namespace }}
data:
  PORT: "3003"
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  REDIS_URL: "redis://redis-master:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  NOTIFICATION_SERVICE_OTEL_SERVICE_NAME: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.notificationService.replicaCount }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: "{{ .Values.image.prefix }}-notification-service:{{ .Values.notificationService.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: notification-service-cm
          ports:
            - name: http
              containerPort: 3003
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.notificationService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
