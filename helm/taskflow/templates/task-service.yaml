apiVersion: v1
kind: ConfigMap
metadata:
  name: task-service-cm
  namespace: {{ .Release.Namespace }}
data:
  PORT: "3002"
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  DATABASE_URL: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.db }}"
  REDIS_URL: "redis://redis-master:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  TASK_SERVICE_OTEL_SERVICE_NAME: task-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.taskService.replicaCount }}
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: "{{ .Values.image.prefix }}-task-service:{{ .Values.taskService.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: task-service-cm
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.taskService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: task-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
