apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-cm
  namespace: {{ .Release.Namespace }}
data:
  PORT: "3000"
  LOG_LEVEL: {{ .Values.logLevel | quote }}
  JWT_SECRET: {{ .Values.apiGateway.jwtSecret | quote }}
  USER_SERVICE_URL: "http://user-service:3001"
  TASK_SERVICE_URL: "http://task-service:3002"
  NOTIFICATION_SERVICE_URL: "http://notification-service:3003"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  API_GATEWAY_OTEL_SERVICE_NAME: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.image.prefix }}-api-gateway:{{ .Values.apiGateway.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: api-gateway-cm
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
