# Production : images figées, secrets forts, plus de replicas, plus de ressources
image:
  prefix: lordtibu/taskflow
  tag: v1.0.0
  pullPolicy: Always

postgres:
  user: taskflow
  password: REMPLACER_PAR_MOT_DE_PASSE_FORT
  db: taskflow_prod
  storageSize: 10Gi

frontend:
  replicaCount: 2
  tag: v1.0.1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "150m"

userService:
  replicaCount: 3
  tag: v1.0.0
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

taskService:
  replicaCount: 3
  tag: v1.0.0
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

notificationService:
  replicaCount: 1
  tag: v1.0.0
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"

apiGateway:
  replicaCount: 3
  tag: v1.0.0
  jwtSecret: REMPLACER_PAR_SECRET_JWT_FORT
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

redis:
  enabled: true
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
